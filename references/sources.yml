# 信息源配置
# 格式：name, url, type(RSS/Page/Search), priority(1-5), enabled

sources:
  # ===== OpenAI =====
  - name: "OpenAI Research"
    url: "https://openai.com/research/"
    type: page
    priority: 1
    enabled: true
    selectors:
      - "a[href*='/research/']"

  - name: "OpenAI Publications"
    url: "https://openai.com/research/index/publication/"
    type: page
    priority: 1
    enabled: true
    selectors:
      - "a[href*='/research/']"

  - name: "OpenAI RSS"
    url: "https://openai.com/news/rss.xml"
    type: rss
    priority: 1
    enabled: true

  - name: "OpenAI Blog"
    url: "https://openai.com/blog"
    type: page
    priority: 2
    enabled: true

  # ===== Anthropic =====
  - name: "Anthropic Research"
    url: "https://www.anthropic.com/research"
    type: page
    priority: 1
    enabled: true
    selectors:
      - "a[href*='/research/']"

  - name: "Anthropic Newsroom"
    url: "https://www.anthropic.com/news"
    type: page
    priority: 2
    enabled: true
    selectors:
      - "a[href*='/news/']"

  # ===== 补充来源（搜索兜底） =====
  - name: "arXiv OpenAI"
    url: "https://arxiv.org/search/?query=openai&searchtype=all&order=-announced_date_first"
    type: page
    priority: 3
    enabled: true

  - name: "arXiv Anthropic"
    url: "https://arxiv.org/search/?query=anthropic&searchtype=all&order=-announced_date_first"
    type: page
    priority: 3
    enabled: true

  - name: "Hugging Face Papers"
    url: "https://huggingface.co/papers"
    type: page
    priority: 4
    enabled: true
