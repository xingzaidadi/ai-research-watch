# 信息源配置
# 格式：name, url, type(RSS/Page/Search), priority(1-5), enabled

sources:
  # ===== OpenAI =====
  - name: "OpenAI Research"
    url: "https://openai.com/research/"
    type: page
    priority: 1
    enabled: true
    selectors:
      - "a[href*='/research/']"

  - name: "OpenAI Publications"
    url: "https://openai.com/research/index/publication/"
    type: page
    priority: 1
    enabled: true
    selectors:
      - "a[href*='/research/']"

  - name: "OpenAI RSS"
    url: "https://openai.com/news/rss.xml"
    type: rss
    priority: 1
    enabled: true

  - name: "OpenAI Blog"
    url: "https://openai.com/blog"
    type: page
    priority: 2
    enabled: true

  # ===== Anthropic =====
  - name: "Anthropic Research"
    url: "https://www.anthropic.com/research"
    type: page
    priority: 1
    enabled: true
    selectors:
      - "a[href*='/research/']"

  - name: "Anthropic Newsroom"
    url: "https://www.anthropic.com/news"
    type: page
    priority: 2
    enabled: true
    selectors:
      - "a[href*='/news/']"

  # ===== Anthropic 补充 =====
  - name: "Anthropic Engineering Blog"
    url: "https://www.anthropic.com/engineering"
    type: page
    priority: 1
    enabled: true
    selectors:
      - "a[href*='/engineering/']"

  # ===== OpenAI 补充 =====
  - name: "OpenAI GitHub Blog"
    url: "https://github.com/openai"
    type: page
    priority: 2
    enabled: true

  # ===== arXiv 精准搜索（priority 2，更积极抓取） =====
  - name: "arXiv OpenAI"
    url: "https://arxiv.org/search/?query=openai&searchtype=all&order=-announced_date_first"
    type: page
    priority: 2
    enabled: true

  - name: "arXiv Anthropic"
    url: "https://arxiv.org/search/?query=anthropic&searchtype=all&order=-announced_date_first"
    type: page
    priority: 2
    enabled: true

  # ===== 其他高质量来源 =====
  - name: "Hugging Face Papers"
    url: "https://huggingface.co/papers"
    type: page
    priority: 3
    enabled: true

  - name: "Google DeepMind Blog"
    url: "https://deepmind.google/discover/blog/"
    type: page
    priority: 2
    enabled: true

  - name: "Meta AI Blog"
    url: "https://ai.meta.com/blog/"
    type: page
    priority: 3
    enabled: true

  - name: "arXiv CS.AI"
    url: "https://arxiv.org/list/cs.AI/recent"
    type: page
    priority: 4
    enabled: true

  - name: "arXiv CS.CL"
    url: "https://arxiv.org/list/cs.CL/recent"
    type: page
    priority: 4
    enabled: true
